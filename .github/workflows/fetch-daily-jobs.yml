name: 每日拉取飞书岗位数据

on:
  schedule:
    # 北京时间次日凌晨 1:00 = UTC 17:00
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 安装依赖
        run: npm install

      - name: 拉取飞书岗位数据
        run: npm run fetch:jobs
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_REFRESH_TOKEN: ${{ secrets.FEISHU_REFRESH_TOKEN }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}

      - name: 检查数据变更
        id: check-changes
        run: |
          if git diff --quiet client/public/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 client/public/data/ 目录无变更，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📋 检测到岗位数据更新"
          fi

      - name: 提交并推送更新
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add client/public/data/
          git commit -m "chore: 自动更新每日岗位数据"
          git push origin main
